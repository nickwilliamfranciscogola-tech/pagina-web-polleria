<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}El Carbón Dorado{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <span class="logo-icon">🔥</span>
      <span class="logo-text">El Carbón Dorado</span>
    </a>
    <ul class="nav-links">
      <li><a href="/">Inicio</a></li>
      <li><a href="/menu">Carta</a></li>
      <li><a href="/login" class="nav-btn">Admin</a></li>
    </ul>
  </nav>

  <main>{% block content %}{% endblock %}</main>

  <footer class="footer">
    <p>© 2024 El Carbón Dorado · Lima, Perú · <a href="tel:+51987654321">987 654 321</a></p>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
